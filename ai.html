<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant | E-Healthcare Advisor</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-with-sticky-footer">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="project.html">E-Healthcare Advisor</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="project.html">Home</a>
        <a href="doc.html">Specializations</a>
        <a href="app.html">Appointments</a>
        <a href="art.html">Articles</a>
        <a href="contact.html">Contact</a>
        <a href="ai.html">AI Assistant</a>
      </nav>
    </div>
  </header>

  <main class="chat-wrap">
    <section class="chat-box" id="chatContainer" aria-live="polite">
      <div class="message bot-message">Welcome. I can help with appointment and specialization guidance.</div>
    </section>
    <section class="chat-input">
      <input type="text" id="messageInput" placeholder="Type your message..." aria-label="Message">
      <button class="btn" id="sendButton" type="button">Send</button>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="currentYear"></span> E-Healthcare Advisor</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script>
    const chatContainer = document.getElementById("chatContainer");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");

    function addMessage(text, type) {
      const node = document.createElement("div");
      node.className = "message " + type;
      node.textContent = text;
      chatContainer.appendChild(node);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, "user-message");
      messageInput.value = "";
      try {
        const data = await AppApi.request("/chat", {
          method: "POST",
          body: JSON.stringify({ message: text })
        });
        addMessage(data.reply, "bot-message");
      } catch (error) {
        addMessage(error.message + " Please login first.", "bot-message");
      }
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
