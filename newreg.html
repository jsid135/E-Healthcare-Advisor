<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | E-Healthcare Advisor</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page-with-sticky-footer">
  <main class="form-shell">
    <section class="card">
      <p class="kicker">Create Account</p>
      <h1>Patient Registration</h1>
      <form id="signupForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
          </div>
          <div class="form-group">
            <label for="place">City</label>
            <input type="text" id="place" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" minlength="8" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" minlength="8" required>
          </div>
        </div>
        <button class="btn" type="submit">Create Account</button>
        <p class="helper" style="margin-top: 1rem;">Already registered? <a href="login.html">Login</a></p>
        <div id="signupFeedback" class="feedback" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const dob = document.getElementById("dob").value;
      const place = document.getElementById("place").value.trim();
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();

      if (password !== confirmPassword) {
        showFeedback("signupFeedback", "error", "Passwords do not match.");
        return;
      }

      if (!email.includes("@")) {
        showFeedback("signupFeedback", "error", "Please enter a valid email address.");
        return;
      }

      try {
        await AppApi.request("/auth/register", {
          method: "POST",
          body: JSON.stringify({
            firstName,
            lastName,
            dob,
            place,
            email,
            username,
            password
          })
        });
        showFeedback("signupFeedback", "success", "Registration complete. Redirecting to login...");
        setTimeout(function () {
          window.location.href = "login.html";
        }, 900);
      } catch (error) {
        showFeedback("signupFeedback", "error", error.message);
      }
    });
  </script>
</body>
</html>
